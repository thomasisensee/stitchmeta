name: CI

on:
  # Run on pushes to the main branch
  push:
    branches:
      - main
  # Run on all pull requests to the main branch
  pull_request:
    branches:
      - main
  # Run upon manual triggers through the 'Actions' tab of the Github UI
  workflow_dispatch:

jobs:
  build-and-test:
    name: Testing on ${{matrix.os}} / Python ${{matrix.python-version}}
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.14"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python package
      run: |
        python -m pip install .[tests]

    - name: Run Python tests
      run: |
        python -m pytest

  coverage:
    name: Coverage Testing
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Install Python package
      run: |
        python -m pip install .[tests]

    - name: Run Python tests
      run: |
        python -m pytest --cov --cov-branch --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        fail_ci_if_error: true
        files: ./tests/coverage.xml
        flags: python
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true
